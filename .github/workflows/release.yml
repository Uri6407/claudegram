name: Release

on:
  push:
    tags:
      - "claudegram--v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#claudegram--v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify version matches plugin.json
        env:
          TAG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          MANIFEST_VER=$(jq -r '.version' .claude-plugin/plugin.json)
          if [ "$MANIFEST_VER" != "$TAG_VERSION" ]; then
              echo "tag version != plugin.json version ($MANIFEST_VER)"
              exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: Claudegram v${{ steps.version.outputs.version }}
          body_path: CHANGELOG.md
